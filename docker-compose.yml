version: "3.9"

# ═══════════════════════════════════════════════════════════════
#  Clube de Palpites · Copa do Mundo 2026 · Docker Compose FINAL
#  Serviços: postgres · backend · frontend · evolution (WhatsApp)
# ═══════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cdp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-clube_palpite}
      POSTGRES_USER:     ${POSTGRES_USER:-cdp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cdp_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cdp_net

  # ── API Backend Node.js ────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cdp_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL:        postgresql://${POSTGRES_USER:-cdp_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-clube_palpite}
      JWT_SECRET:          ${JWT_SECRET}
      JWT_EXPIRES_IN:      ${JWT_EXPIRES_IN:-8h}
      PORT:                3333
      NODE_ENV:            production
      APP_URL:             ${APP_URL}
      # Mercado Pago PIX
      MP_ACCESS_TOKEN:     ${MP_ACCESS_TOKEN:-}
      MP_WEBHOOK_SECRET:   ${MP_WEBHOOK_SECRET:-}
      # WhatsApp Evolution API
      EVOLUTION_API_URL:   http://evolution:8080
      EVOLUTION_API_KEY:   ${EVOLUTION_API_KEY:-}
      EVOLUTION_INSTANCE:  clube-palpite
    command: >
      sh -c "npx prisma db push --accept-data-loss &&
             node prisma/seed.js &&
             node src/server.js"
    networks:
      - cdp_net

  # ── Frontend Nginx ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cdp_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - cdp_net

  # ── Evolution API (WhatsApp) ───────────────────────────────
  evolution:
    image: atendai/evolution-api:latest
    container_name: cdp_evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_URL:             ${APP_URL:-http://localhost:8080}
      AUTHENTICATION_TYPE:    apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-changeme}
      DEL_INSTANCE:           "false"
      STORE_MESSAGES:         "true"
      DATABASE_ENABLED:       "false"
    volumes:
      - evolution_data:/evolution/instances
    networks:
      - cdp_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  evolution_data:

networks:
  cdp_net:
    driver: bridge
